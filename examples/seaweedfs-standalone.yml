---
# Example deployment manifest for standalone SeaweedFS
#
# ⚠️ DEV/TEST ONLY - Single VM deployment (no HA)
# This demonstrates a simple single-instance deployment for development and test environments.
# For production, use AWS S3, GCS, or Azure Blob Storage.

name: seaweedfs

releases:
- name: seaweedfs
  version: latest
- name: bpm
  version: latest

stemcells:
- alias: default
  os: ubuntu-jammy
  version: latest

update:
  canaries: 1
  canary_watch_time: 30000-600000
  max_in_flight: 1
  update_watch_time: 5000-600000
  serial: true

instance_groups:
- name: seaweedfs
  instances: 1
  azs:
  - z1
  vm_type: small
  persistent_disk_type: 100GB
  stemcell: default
  networks:
  - name: default

  jobs:
  - name: seaweedfs
    release: seaweedfs
    properties:
      seaweedfs:
        s3:
          enabled: true
          port: 8333
          domain_name: ((seaweedfs_domain_name))
          # Credentials auto-generated by BOSH
          access_key: ((seaweedfs_access_key))
          secret_key: ((seaweedfs_secret_key))
          buckets:
          - buildpacks
          - droplets
          - packages
          - resources

        tls:
          enabled: true
          # TLS certificate auto-generated by BOSH
          cert: ((seaweedfs_tls.certificate))
          private_key: ((seaweedfs_tls.private_key))
          ca_cert: ((seaweedfs_tls.ca))

        # mTLS disabled by default for POC
        # Enable for production CF integration
        mutual_tls:
          enabled: false
          # When enabled, use the same CA as CF internal services
          # ca_cert: ((service_cf_internal_ca.certificate))
          verify_client: "require"

        master:
          port: 9333
          default_replication: "000"
          volume_size_limit_mb: 30000

        volume:
          port: 8080
          max_volumes: 100
          data_dir: /var/vcap/store/seaweedfs/volume

        filer:
          port: 8888
          data_dir: /var/vcap/store/seaweedfs/filer
          default_leveldb_dir: /var/vcap/store/seaweedfs/filer_db

        backup:
          enabled: true

        log_level: 1

# BOSH auto-generates these variables
# No manual credential management needed!
variables:
# S3 credentials (auto-generated passwords)
- name: seaweedfs_access_key
  type: password
  options:
    length: 32
- name: seaweedfs_secret_key
  type: password
  options:
    length: 64

# TLS certificates (auto-generated)
- name: seaweedfs_ca
  type: certificate
  options:
    is_ca: true
    common_name: seaweedfsCA
- name: seaweedfs_tls
  type: certificate
  options:
    ca: seaweedfs_ca
    common_name: ((seaweedfs_domain_name))
    alternative_names:
    - ((seaweedfs_domain_name))
    - "*.((seaweedfs_domain_name))"
    extended_key_usage:
    - server_auth
    - client_auth
