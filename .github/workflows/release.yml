name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install BOSH CLI
        run: |
          wget -q https://github.com/cloudfoundry/bosh-cli/releases/download/v7.5.5/bosh-cli-7.5.5-linux-amd64
          chmod +x bosh-cli-7.5.5-linux-amd64
          sudo mv bosh-cli-7.5.5-linux-amd64 /usr/local/bin/bosh

      - name: Create Release Tarball
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          bosh create-release --version="${VERSION}" --tarball="seaweedfs-release-${VERSION}.tgz" --final

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: seaweedfs-release-*.tgz
          body: |
            SeaweedFS BOSH Release ${{ github.ref_name }}

            ## Installation

            ```bash
            bosh upload-release seaweedfs-release-${{ github.ref_name }}.tgz
            ```

            See [README.md](README.md) for deployment instructions.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit final release artifacts
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .final_builds/ releases/
          git commit -m "Final release for ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin HEAD:main || echo "Nothing to push"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
